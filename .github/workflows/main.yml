name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]


env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm test -- --coverage --coverageReporters=json-summary

      - name: Check coverage threshold (≥80%)
        run: |
          # Vérifier que le fichier de couverture existe
          if [ ! -f coverage/coverage-summary.json ]; then
            echo " Fichier coverage/coverage-summary.json introuvable"
            exit 1
          fi

          # Extraire le pourcentage de lignes couvertes avec jq (préinstallé)
          COVERAGE=$(jq -r '.total.lines.pct' coverage/coverage-summary.json)
          echo "Couverture détectée : $COVERAGE%"

          # Comparaison avec le seuil de 80%
          if (( $(echo "$COVERAGE < 80" | bc -l) )); then
            echo "Échec : couverture insuffisante ($COVERAGE% < 80%)"
            exit 1
          else
            echo " Succès : couverture suffisante ($COVERAGE%)"
          fi
